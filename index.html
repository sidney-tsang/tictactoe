<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { text-align: center; }
    #score strong { display: block; font-size: 1.6rem; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    <span>X Wins<strong id="xWins">0</strong></span>
    <span>Draws<strong id="draws">0</strong></span>
    <span>O Wins<strong id="oWins">0</strong></span>
  </div>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const xWinsEl = document.getElementById('xWins');
    const oWinsEl = document.getElementById('oWins');
    const drawsEl = document.getElementById('draws');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let cells, current, gameOver, score = { X: 0, O: 0, D: 0 };

    function init() {
      cells = Array(9).fill('');
      current = 'X';
      gameOver = false;
      status.textContent = "X's turn";
      board.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', handleClick);
        board.appendChild(cell);
      }
    }

    function handleClick(e) {
      const i = +e.target.dataset.i;
      if (gameOver || cells[i]) return;

      cells[i] = current;
      e.target.textContent = current;
      e.target.classList.add('taken', current.toLowerCase());

      const winLine = getWin();
      if (winLine) {
        winLine.forEach(idx => board.children[idx].classList.add('win'));
        status.textContent = `${current} wins!`;
        score[current]++;
        xWinsEl.textContent = score.X;
        oWinsEl.textContent = score.O;
        gameOver = true;
      } else if (cells.every(Boolean)) {
        status.textContent = "It's a draw!";
        score.D++;
        drawsEl.textContent = score.D;
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }

    function getWin() {
      return WINS.find(([a, b, c]) =>
        cells[a] && cells[a] === cells[b] && cells[b] === cells[c]
      ) || null;
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>
